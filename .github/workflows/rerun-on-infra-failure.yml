name: rerun-on-infra-failure

# Automatically rerun failed jobs caused by transient infrastructure issues:
# runner shutdowns (SIGTERM/exit 143), GitHub API outages (503/504),
# corrupt action manifests, and runner encoding errors.

permissions:
  actions: write

on:
  workflow_run: # zizmor: ignore[dangerous-triggers]
    workflows: [build, build-v2, performance]
    types: [completed]

jobs:
  rerun:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Check for infrastructure failures
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          # Infrastructure failure patterns split into two groups:
          #
          # 1. Unique patterns that only appear in framework/runner output.
          #    Safe to match anywhere in the log.
          unique_patterns=(
            "The runner has received a shutdown signal"
            "The operation was canceled"
            "Failed to load.*action\.yml"
            "Process completed with exit code 143"
          )

          # 2. Ambiguous patterns that could appear in test or build output.
          #    Only match inside GitHub Actions ##[error] annotation lines.
          ambiguous_patterns=(
            "Illegal byte sequence"
            "cannot contain null bytes"
            "cannot execute binary file"
            "503 Service Unavailable"
            "504 Gateway Timeout"
            "Connection refused.*os error 111"
            "Connection reset by peer"
          )

          unique_regex=$(printf '%s|' "${unique_patterns[@]}")
          unique_regex="${unique_regex%|}"

          ambiguous_regex=$(printf '%s|' "${ambiguous_patterns[@]}")
          ambiguous_regex="${ambiguous_regex%|}"

          # Fetch failed job IDs and names
          failed_jobs=$(
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/jobs?filter=latest&per_page=100" \
              --jq '.jobs[] | select(.conclusion == "failure") | "\(.id)\t\(.name)"'
          )

          if [ -z "$failed_jobs" ]; then
            echo "No failed jobs found"
            echo "should_rerun=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check each failed job's logs for infrastructure patterns.
          should_rerun=false
          matched_job=""
          matched_category=""

          while IFS=$'\t' read -r job_id job_name; do
            logs=$(gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$job_id/logs" 2>/dev/null || echo "")
            if [ -z "$logs" ]; then
              continue
            fi

            # Check unique patterns against full log
            if echo "$logs" | grep -qE "$unique_regex"; then
              should_rerun=true
              matched_job="$job_name"
              matched_category="runner/framework"
              break
            fi

            # Check ambiguous patterns only in ##[error] annotation lines.
            # Extract annotations first to avoid SIGPIPE under pipefail.
            annotations=$(echo "$logs" | grep '##\[error\]' || true)
            if [ -n "$annotations" ] && echo "$annotations" | grep -qE "$ambiguous_regex"; then
              should_rerun=true
              matched_job="$job_name"
              matched_category="error annotation"
              break
            fi
          done <<< "$failed_jobs"

          {
            echo "should_rerun=$should_rerun"
            echo "matched_job=$matched_job"
            echo "matched_category=$matched_category"
          } >> "$GITHUB_OUTPUT"

      - name: Rerun failed jobs
        if: steps.check.outputs.should_rerun == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          echo "Rerunning failed jobs for run $RUN_ID (attempt ${{ github.event.workflow_run.run_attempt }})"
          gh run rerun "$RUN_ID" --failed --repo "$GITHUB_REPOSITORY"

      - name: Write job summary
        if: always()
        env:
          WORKFLOW: ${{ github.event.workflow_run.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          SHOULD_RERUN: ${{ steps.check.outputs.should_rerun }}
          MATCHED_JOB: ${{ steps.check.outputs.matched_job }}
          MATCHED_CATEGORY: ${{ steps.check.outputs.matched_category }}
        run: |
          {
            echo "## Auto-rerun result"
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Workflow | \`$WORKFLOW\` |"
            echo "| Run | [#$RUN_ID](https://github.com/$GITHUB_REPOSITORY/actions/runs/$RUN_ID) |"
            echo "| Attempt | $ATTEMPT |"
            if [ "$SHOULD_RERUN" = "true" ]; then
              echo "| Action | Rerun triggered |"
              echo "| Matched job | \`$MATCHED_JOB\` |"
              echo "| Category | $MATCHED_CATEGORY |"
            else
              echo "| Action | No infra failure detected |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
